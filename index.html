<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Ardea Caffè - Smart Table</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f8f9fa; padding: 20px; }
        .btn-call { background-color: #d9534f; color: white; border: none; padding: 20px; font-size: 1.2rem; border-radius: 50px; cursor: pointer; width: 100%; margin-bottom: 20px; }
        .quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .quick-btn { padding: 15px; background: white; border: 1px solid #ddd; border-radius: 10px; cursor: pointer; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="tavolo" id="tavolo-label">Tavolo --</div>
    <button class="btn-call" id="btn-call" onclick="inviaChiamata('generic', 'Chiamata Generica')">🔔 CHIAMA CAMERIERE</button>
    <div class="quick-grid" id="menu-container"></div>

    <script>
        const client = supabase.createClient('https://izmppsvnxghfeitktldh.supabase.co', 'YOUR_SUPABASE_KEY');
        const t = new URLSearchParams(window.location.search).get('tavolo') || '05';
        document.getElementById('tavolo-label').innerText = "Tavolo " + t;

        // Carica i bottoni dal DB
        async function caricaMenu() {
            const { data } = await client.from('config_buttons').select('*').eq('is_active', true);
            const container = document.getElementById('menu-container');
            container.innerHTML = "";
            data?.forEach(btn => {
                const b = document.createElement('button');
                b.className = 'quick-btn';
                b.innerText = btn.label;
                b.onclick = () => inviaChiamata(btn.action_type, btn.label);
                container.appendChild(b);
            });
        }

        // Invia chiamata + Audit Log
        async function inviaChiamata(tipo, desc) {
            await client.from('audit_events').insert([{ event_type: 'call_created', table_id: 'Tavolo ' + t, metadata: { type: tipo } }]);
            await client.from('calls').insert([{ table_number: 'Tavolo ' + t, call_type: tipo, payload: { label: desc }, status: 'pending' }]);
            alert(desc + " richiesta!");
        }

        caricaMenu();
    </script>
</body>
</html>
