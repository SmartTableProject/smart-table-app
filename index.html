<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ardea Caffè</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; text-align: center; background-color: #f8f9fa; margin: 0; padding: 20px; }
        
        /* Stile Logo */
        img { max-width: 200px; margin-top: 40px; margin-bottom: 20px; }
        
        /* Stile Tavolo Ingrandito */
        .tavolo { font-size: 4rem; font-weight: bold; color: #2c3e50; margin-top: 20px; margin-bottom: 50px; }
        
        .btn-call { background-color: #d9534f; color: white; border: none; padding: 25px 40px; font-size: 1.5rem; border-radius: 50px; cursor: pointer; width: 90%; max-width: 300px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-menu { background-color: #5cb85c; color: white; border: none; padding: 15px 30px; font-size: 1.2rem; border-radius: 50px; cursor: pointer; width: 80%; max-width: 250px; margin-top: 20px; }
        #status { margin-top: 30px; font-size: 0.9rem; color: #999; }
    </style>
</head>
<body>

    <!-- ASSICURATI CHE IL NOME QUI SOTTO CORRISPONDA AL TUO FILE SU GITHUB -->
    <img src="logo.png" alt="Logo">

    <div class="tavolo" id="tavolo-info">Tavolo 05</div>

    <button class="btn-call" onclick="chiamaCameriere()">🔔 CHIAMA CAMERIERE</button>
    <br>
    <button class="btn-menu" onclick="apriMenu()">📖 Visualizza Menu</button>

    <div id="status"></div>

    <script>
        const SUPABASE_URL = 'https://izmppsvnxghfeitktldh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_rOqbGgg0pZYrXHfLLiRBzg_TZmMspfd';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function chiamaCameriere() {
            const btn = document.querySelector('.btn-call');
            btn.innerText = "Invio in corso...";
            btn.disabled = true;

            const { data, error } = await supabase
                .from('calls')
                .insert([{ table_number: 'Tavolo 05', status: 'pending' }]);

            if (error) {
                alert("Errore nell'invio, riprova!");
                btn.innerText = "🔔 CHIAMA CAMERIERE";
                btn.disabled = false;
            } else {
                alert("Cameriere avvisato!");
                btn.innerText = "✅ CHIAMATA INVIATA";
                btn.style.backgroundColor = "#5cb85c";
            }
        }

        function apriMenu() {
            alert("Apertura Menu...");
        }
    </script>
</body>
</html>
