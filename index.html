<!DOCTYPE html>
<html>
<head>
    <title>Smart Table - Test Connessione</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Smart Table - Sistema Connesso</h1>
    <div id="status">Inizializzazione...</div>

    <script>
        // Sostituisci solo quello che c'è dentro le virgolette
        const SUPABASE_URL = 'https://izmppsvnxghfeitktldh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_rOqbGgg0pZYrXHfLLiRBzg_TZmMspfd';

        console.log("Inizializzazione Supabase...");

        try {
            const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            async function testConnection() {
                document.getElementById('status').innerText = 'Test in corso...';
                
                const { data, error } = await client.from('tenants').select('*');
                
                if (error) {
                    console.error("Errore Supabase:", error);
                    document.getElementById('status').innerText = 'Errore: ' + error.message;
                } else {
                    console.log("Successo!", data);
                    document.getElementById('status').innerText = 'Connessione OK! Database pronto.';
                }
            }
            testConnection();
        } catch (err) {
            console.error("Errore fatale:", err);
            document.getElementById('status').innerText = 'Errore fatale: ' + err.message;
        }
    </script>
</body>
</html>
