<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ardea Caffè - Smart Table</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f8f9fa; padding: 20px; }
        img { max-width: 150px; margin: 20px 0; }
        .tavolo { font-size: 2rem; color: #2c3e50; margin-bottom: 20px; }
        
        /* Layout Bottoni */
        .btn-call { background-color: #d9534f; color: white; border: none; padding: 20px; font-size: 1.2rem; border-radius: 50px; cursor: pointer; width: 100%; margin-bottom: 20px; }
        .quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .quick-btn { padding: 15px; background: white; border: 1px solid #ddd; border-radius: 10px; cursor: pointer; font-size: 0.9rem; }
    </style>
</head>
<body>

    <img src="logo.png" alt="Logo">
    <div class="tavolo" id="tavolo-label">Tavolo --</div>

    <!-- Pulsante principale -->
    <button class="btn-call" id="btn-call" onclick="inviaChiamata('generic', 'Chiamata Generica')">🔔 CHIAMA CAMERIERE</button>

    <!-- Pannello Quick Actions -->
    <div class="quick-grid">
        <button class="quick-btn" onclick="inviaChiamata('water', 'Acqua/Bibite')">💧 Acqua/Bibite</button>
        <button class="quick-btn" onclick="inviaChiamata('bread', 'Pane')">🥖 Pane</button>
        <button class="quick-btn" onclick="inviaChiamata('cutlery', 'Posate')">🍴 Posate</button>
        <button class="quick-btn" onclick="inviaChiamata('clean', 'Pulizia')">🧽 Pulizia</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://izmppsvnxghfeitktldh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6bXBwc3ZueGdoZmVpdGt0bGRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwMzA3NTIsImV4cCI6MjA5OTYwNjc1Mn0.-LQQC11p6d25EG67J1YCTp2QpYc2WlMW3nmg-z-VK_0';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Lettura dinamica tavolo
        const params = new URLSearchParams(window.location.search);
        const t = params.get('tavolo') || '05';
        document.getElementById('tavolo-label').innerText = "Tavolo " + t;

        // Funzione per inviare l'Audit Log (Fire-and-Forget)
        async function logAudit(eventType, tableId, metadata = {}) {
            supabaseClient
                .from('audit_events')
                .insert([{
                    event_type: eventType,
                    table_id: tableId,
                    metadata: metadata
                }])
                .then(({ error }) => {
                    if (error) console.error("Errore log:", error);
                });
        }

        async function inviaChiamata(tipo, desc) {
            // Eseguiamo il log immediato
            logAudit('call_created', 'Tavolo ' + t, { type: tipo, description: desc });
            
            const btn = document.getElementById('btn-call');
            try {
                const { error } = await supabaseClient.from('calls').insert([{ 
                    table_number: 'Tavolo ' + t, 
                    call_type: tipo, 
                    payload: { label: desc },
                    status: 'pending' 
                }]);

                if (error) throw error;
                alert(desc + " richiesta!");
            } catch (err) {
                alert("Errore: " + err.message);
            }
        }
    </script>
</body>
</html>
