<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ardea Caffè</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f8f9fa; padding: 20px; }
        img { max-width: 200px; margin-top: 40px; margin-bottom: 20px; }
        .tavolo { font-size: 3rem; font-weight: bold; color: #2c3e50; margin-bottom: 50px; }
        .btn-call { background-color: #d9534f; color: white; border: none; padding: 25px 40px; font-size: 1.5rem; border-radius: 50px; cursor: pointer; width: 90%; max-width: 300px; }
    </style>
</head>
<body>

    <img src="logo.png" alt="Logo">
    <div class="tavolo">Tavolo 05</div>
    <button class="btn-call" id="btn-call" onclick="chiamaCameriere()">🔔 CHIAMA CAMERIERE</button>

    <script>
        const SUPABASE_URL = 'https://izmppsvnxghfeitktldh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_rOqbGgg0pZYrXHfLLiRBzg_TZmMspfd';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function chiamaCameriere() {
            const btn = document.getElementById('btn-call');
            btn.innerText = "Invio in corso...";
            
            try {
                const { data, error } = await supabaseClient
                    .from('calls')
                    .insert([{ table_number: 'Tavolo 05', status: 'pending' }]);

                if (error) {
                    console.error("ERRORE INVIO:", error);
                    alert("Errore invio: " + error.message);
                    btn.innerText = "🔔 CHIAMA CAMERIERE";
                } else {
                    btn.innerText = "✅ CHIAMATA INVIATA";
                    btn.style.backgroundColor = "#5cb85c";
                }
            } catch (err) {
                console.error("ERRORE CATASTROFICO:", err);
                btn.innerText = "🔔 CHIAMA CAMERIERE";
            }
        }
    </script>
</body>
</html>
